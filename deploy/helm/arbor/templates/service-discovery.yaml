{{- $s := .Values.services.discovery }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $s.name }}
  labels: {{- include "arbor.labels" (dict "name" $s.name) | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: {{ $s.name }} } }
  template:
    metadata:
      labels: {{- include "arbor.labels" (dict "name" $s.name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $s.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: app
          image: {{ include "arbor.image" (dict "name" $s.name "Values" .Values) | trim }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports: [{ containerPort: {{ $s.port }} }]
          env:
            - { name: SPRING_PROFILES_ACTIVE,         value: "kubernetes" }
            - { name: SERVER_PORT,                    value: "{{ $s.port }}" }
            - { name: EUREKA_CLIENT_REGISTER_WITH_EUREKA, value: "false" }
            - { name: EUREKA_CLIENT_FETCH_REGISTRY,   value: "false" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT,    value: "http://otel-collector:4318" }
            - { name: OTEL_SERVICE_NAME,              value: "{{ $s.name }}" }
            - { name: OTEL_RESOURCE_ATTRIBUTES,       value: "deployment.environment=arbor" }
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:+UseContainerSupport -Xmx256m -javaagent:/opt/app/otel-javaagent.jar -Dotel.config.file=/opt/app/configs/otel.yaml" }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: {{ $s.port }} }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $s.name }}
spec:
  selector: { app.kubernetes.io/name: {{ $s.name }} }
  ports: [{ name: http, port: {{ $s.port }}, targetPort: {{ $s.port }} }]
