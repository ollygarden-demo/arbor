imageRegistry: ghcr.io/ollygarden-demo
imageTag: main
imagePullPolicy: IfNotPresent

ollyGarden:
  otlpEndpoint: ""            # set via --set or values-local.yaml
  apiKeySecretRef:
    name: ollygarden-api-key
    key: api-key

envoy:
  image: envoyproxy/envoy:v1.31-latest

services:
  apiGateway:     { name: api-gateway,     port: 8080 }
  customers:      { name: customers-service, port: 8081 }
  vets:           { name: vets-service,    port: 8083 }
  visits:         { name: visits-service,  port: 8082 }
  notifications:  { name: notifications-service, port: 8088 }
  discovery:      { name: discovery-server, port: 8761 }
  config:         { name: config-server,   port: 8888 }

kafka:
  # Bitnami moved their public Docker Hub images to bitnamilegacy/* in Aug 2025.
  image:
    repository: bitnamilegacy/kafka
  controller: { replicaCount: 1 }
  broker:     { replicaCount: 1 }
  listeners:
    client:     { protocol: PLAINTEXT }
    controller: { protocol: PLAINTEXT }
    interbroker: { protocol: PLAINTEXT }
    external:   { protocol: PLAINTEXT }
  sasl:
    enabledMechanisms: ""
    interBrokerMechanism: ""
    controllerMechanism: ""
  provisioning:
    enabled: true
    topics:
      - name: visit.created
        partitions: 3
        replicationFactor: 1
  serviceAccount:
    create: true
  rbac:
    create: true
  defaultInitContainers:
    prepareConfig:
      image:
        repository: bitnamilegacy/os-shell
    volumePermissions:
      image:
        repository: bitnamilegacy/os-shell
    autoDiscovery:
      image:
        repository: bitnamilegacy/kubectl
  metrics:
    jmx:
      image:
        repository: bitnamilegacy/jmx-exporter

opentelemetry-collector:
  mode: deployment
  image: { repository: otel/opentelemetry-collector-contrib }
  command:
    name: otelcol-contrib
    extraArgs: ["--config=/etc/arbor/collector.yaml"]
  extraVolumes:
    - name: arbor-cfg
      configMap: { name: otel-collector-config }
  extraVolumeMounts:
    - { name: arbor-cfg, mountPath: /etc/arbor }
  extraEnvs:
    - name: OLLYGARDEN_API_KEY
      valueFrom:
        secretKeyRef:
          name: ollygarden-api-key
          key: api-key
          optional: true
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  service:
    type: ClusterIP

jaeger:
  provisionDataStore: { cassandra: false }
  allInOne: { enabled: true }
  storage: { type: memory }
  agent: { enabled: false }
  collector: { enabled: false }
  query: { enabled: false }

prom:
  grafana:
    adminPassword: arbor
    dashboardProviders: {}
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
