name: smoke
on:
  pull_request: {}
  push: { branches: [main] }
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - name: install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - uses: azure/setup-helm@v4
      - uses: grafana/setup-k6-action@v1
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: bootstrap
        run: ./scripts/bootstrap.sh
        env:
          OLLYGARDEN_API_KEY: ""
      - name: smoke
        run: ./scripts/smoke.sh
      - name: dump cluster state on failure
        if: failure()
        run: |
          set +e
          echo "=== pods ==="
          kubectl -n arbor get pods -o wide
          echo "=== events ==="
          kubectl -n arbor get events --sort-by='.lastTimestamp' | tail -50
          for p in $(kubectl -n arbor get pods -o name | grep -vE "kafka|grafana|jaeger|prom|node-exporter|alertmanager|kube-state"); do
            echo "=== logs: $p (app) ==="
            kubectl -n arbor logs "$p" -c app --tail=40 2>/dev/null || kubectl -n arbor logs "$p" --tail=40
          done
