spring:
  application:
    name: discovery-server
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}

# Avoid some debugging logs at startup
logging:
  level:
    org:
      springframework:
        boot: INFO
        web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

# Standalone Eureka: do not register or fetch registry from peers.
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  instance:
    hostname: discovery-server

server:
  port: 8761

---
spring:
  config:
    activate:
      on-profile: docker
    import: configserver:http://config-server:8888

