apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
      prometheus:
        config:
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs: [{ role: pod }]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  target_label: __metrics_path__
                  regex: (.+)

    processors:
      batch: {}
      memory_limiter: { check_interval: 1s, limit_mib: 400 }
      resourcedetection: { detectors: [env, system] }

    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls: { insecure: true }
{{- if .Values.ollyGarden.otlpEndpoint }}
      otlp/ollygarden:
        endpoint: {{ .Values.ollyGarden.otlpEndpoint | quote }}
        headers:
          x-api-key: ${env:OLLYGARDEN_API_KEY}
{{- end }}
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [otlp/jaeger{{- if .Values.ollyGarden.otlpEndpoint }}, otlp/ollygarden{{- end }}]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [{{ if .Values.ollyGarden.otlpEndpoint }}otlp/ollygarden{{ else }}debug{{ end }}]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [{{ if .Values.ollyGarden.otlpEndpoint }}otlp/ollygarden{{ else }}debug{{ end }}]
